<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SmartLearn</title>
    <meta name="description" content="Reset your password to regain access to your SmartLearn account.">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="alternate icon" href="assets/favicon.svg">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Auth Specific Style -->
    <link rel="stylesheet" href="css/auth.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <img src="assets/logo.png" alt="SmartLearn Logo">
                    Smart<span>Learn</span>
                </a>
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your email to receive recovery instructions</p>
            </div>

            <!-- Reset Password Form -->
            <form id="reset-form" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="name@example.com" required>
                </div>

                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>

            <!-- Navigation Link -->
            <div class="auth-footer">
                Remember your password? <a href="login.html" class="auth-link">Log In</a>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html"
                    style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500; text-decoration: none;">
                    <i class="fas fa-arrow-left" style="margin-right: 0.5rem;"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleReset(e) {
            e.preventDefault();

            // Simple validation simulation
            const email = e.target.querySelector('input[type="email"]').value;

            if (email) {
                // Simulate successful reset link sent
                showToast('Link Sent!', 'Check your email for recovery instructions.', 'success');

                // Clear the form
                e.target.reset();

                // Optional: Redirect to login after a few seconds
                // setTimeout(() => {
                //    window.location.href = 'login.html';
                // }, 3000);
            } else {
                showToast('Error', 'Please enter a valid email address', 'error');
            }
        }

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let iconClass = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';

            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fas ${iconClass}"></i>
                </div>
                <div class="toast-content">
                    <h4>${title}</h4>
                    <p>${message}</p>
                </div>
                <button class="toast-close" onclick="closeToast(this)">
                    <i class="fas fa-times"></i>
                </button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                closeToast(toast.querySelector('.toast-close'));
            }, 5000);
        }

        function closeToast(button) {
            const toast = button.closest('.toast');
            toast.classList.add('hiding');
            setTimeout(() => {
                toast.remove();
            }, 300);
        }
    </script>
</body>

</html>
